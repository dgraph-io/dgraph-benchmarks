services:
  zero:
    image: ${DGRAPH_IMAGE:-dgraph/dgraph:latest}
    container_name: shortestpath-zero
    command: dgraph zero --my=zero:5080 --replicas=1
    ports:
      - "5080:5080"
      - "6080:6080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:6080/state || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  alpha:
    image: ${DGRAPH_IMAGE:-dgraph/dgraph:latest}
    container_name: shortestpath-alpha
    command: >
      dgraph alpha
      --my=alpha:7080
      --zero=zero:5080
      --security whitelist=0.0.0.0/0
    ports:
      - "8080:8080"
      - "9080:9080"
    depends_on:
      zero:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
